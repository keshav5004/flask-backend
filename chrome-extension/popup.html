<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WebShield - Phishing Detector</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <!-- Header -->
  <header class="header">
    <div class="header-brand">
      <div class="header-icon">
        <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
          <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/>
        </svg>
      </div>
      <span class="header-title">WebShield</span>
    </div>
    <div class="header-badge" id="status-badge">Scanning...</div>
  </header>

  <!-- Status Section -->
  <section class="status-section" id="status-section">
    <div class="status-indicator" id="status-indicator">
      <div class="status-ring" id="status-ring">
        <div class="status-icon-inner" id="status-icon-inner">
          <svg id="icon-loading" class="spin" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 2a10 10 0 0 1 10 10" stroke-linecap="round"/>
          </svg>
          <svg id="icon-safe" class="hidden" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5">
            <polyline points="20 6 9 17 4 12"/>
          </svg>
          <svg id="icon-danger" class="hidden" viewBox="0 0 24 24" width="28" height="28" fill="currentColor">
            <path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm-1 6h2v2h-2V7zm0 4h2v6h-2v-6z"/>
          </svg>
          <svg id="icon-error" class="hidden" viewBox="0 0 24 24" width="28" height="28" fill="none" stroke="currentColor" stroke-width="2.5">
            <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
          </svg>
        </div>
      </div>
    </div>
    <h2 class="status-title" id="status-title">Analyzing...</h2>
    <p class="status-message" id="status-message">Checking website safety</p>
  </section>

  <!-- URL Display -->
  <section class="url-section" id="url-section">
    <div class="url-label">Current Website</div>
    <div class="url-text" id="current-url" title="">—</div>
  </section>

  <!-- Risk Details (shown after scan) -->
  <section class="details-section hidden" id="details-section">
    <!-- Signals -->
    <div class="signals-container" id="signals-container">
      <div class="signals-title">Detection Signals</div>
      <ul class="signals-list" id="signals-list">
        <!-- Dynamically populated -->
      </ul>
    </div>
  </section>

  <!-- Actions -->
  <section class="actions-section">
    <button class="btn-scan" id="btn-scan">
      <svg viewBox="0 0 24 24" width="16" height="16" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="23 4 23 10 17 10"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
      </svg>
      Scan Again
    </button>
    <a href="http://127.0.0.1:5000/dashboard" target="_blank" class="btn-dashboard" id="btn-dashboard">
      <svg viewBox="0 0 24 24" width="14" height="14" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
      </svg>
      Dashboard
    </a>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <span>WebShield v1.0</span>
    <span class="footer-dot">•</span>
    <span id="dataset-status">Backend Connected</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
